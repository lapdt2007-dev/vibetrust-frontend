<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTrust - The Anti-Flake Network</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: #0f172a;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button.btn-secondary {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        button.btn-secondary:hover {
            background: rgba(56, 189, 248, 0.1);
        }

        .status-box {
            background: #0f172a;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.85rem;
            word-break: break-all;
            border: 1px solid #334155;
            margin-top: 1.5rem;
        }

        .status-title {
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .status-value {
            color: var(--success);
            font-family: monospace;
            white-space: pre-line;
        }

        .divider {
            height: 1px;
            background: #334155;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>VibeTrust</h1>
    <p class="subtitle">The Anti-Flake Network (Stellar Testnet)</p>

    <button id="connectWalletBtn" class="btn-secondary">Connect Freighter Wallet</button>
    
    <div class="form-group">
        <label>Connected Account Wallet</label>
        <input type="text" id="walletAddress" placeholder="Not connected" readonly>
    </div>

    <div class="divider"></div>

    <div class="form-group">
        <label>Commitment / Project Assignment Title</label>
        <input type="text" id="contractTitle" placeholder="e.g., Submit Cyber Security Presentation">
    </div>

    <div class="form-group">
        <label>Collateral Security Deposit (XLM)</label>
        <input type="number" id="depositAmount" placeholder="0.0" min="0" step="0.1" value="10">
    </div>

    <div class="form-group">
        <label>Contract Execution Mode</label>
        <select id="contractMode">
            <option value="standard">Standard (Reputation Logging Only)</option>
            <option value="escrow_lock">🔒 Private Mode (Lock Escrow Smart Contract)</option>
        </select>
    </div>

    <button id="signContractBtn">Sign & Initialize Contract</button>

    <div class="status-box">
        <div class="status-title">System Execution Logs:</div>
        <div id="statusLog" class="status-value">Ready. Please connect your wallet extension to begin.</div>
    </div>
</div>

<script>
    // XỬ LÝ LIÊN KẾT VÍ FREIGHTER TRỰC TIẾP QUA INJECTED PROVIDER
    document.getElementById('connectWalletBtn').addEventListener('click', async () => {
        const log = document.getElementById('statusLog');
        const walletInput = document.getElementById('walletAddress');

        log.innerText = "Scanning for Stellar wallet extension providers...";

        // Kiểm tra tất cả các biến môi trường được ví tự động nhúng vào window của trình duyệt
        const freighterProvider = window.windowFreighterApi || window.FreighterApi;

        if (freighterProvider) {
            try {
                log.innerText = "Connecting to Freighter Wallet Account...";
                
                // Gọi trực tiếp hàm lấy Public Key chính thức từ ví của người dùng
                const publicKey = await freighterProvider.getPublicKey();
                
                if (publicKey) {
                    walletInput.value = publicKey;
                    log.innerText = "Success: Wallet connected via Freighter API!";
                    
                    // Cập nhật hiệu ứng nút bấm thành công
                    const connectBtn = document.getElementById('connectWalletBtn');
                    connectBtn.innerText = "Wallet Connected";
                    connectBtn.style.background = "var(--success)";
                    connectBtn.style.color = "#ffffff";
                    connectBtn.style.borderColor = "var(--success)";
                } else {
                    log.innerText = "Connection Alert: Request rejected by the user.";
                }
            } catch (error) {
                log.innerText = "Connection Failed: " + error.message;
            }
        } else {
            log.innerText = "ERROR: Freighter Wallet extension not found!";
            alert("KHÔNG TÌM THẤY VÍ FREIGHTER!\n\nVui lòng đảm bảo:\n1. Bạn đang test trên Máy tính bằng Chrome hoặc Brave.\n2. Đã cài đặt extension Freighter Wallet.\n3. Đã mở ví và ĐĂNG NHẬP (Unlock) trước khi bấm kết nối.");
        }
    });

    // XỬ LÝ KÝ HỢP ĐỒNG (MOCKUP INTERACTION VỚI RUST SMART CONTRACT)
    document.getElementById('signContractBtn').addEventListener('click', async () => {
        const log = document.getElementById('statusLog');
        const wallet = document.getElementById('walletAddress').value;
        const title = document.getElementById('contractTitle').value;
        const amount = document.getElementById('depositAmount').value;
        const mode = document.getElementById('contractMode').value;

        if (!wallet) {
            alert("Vui lòng bấm nút 'Connect Freighter Wallet' ở phía trên trước!");
            return;
        }
        if (!title) {
            alert("Vui lòng nhập nội dung cam kết / tiêu đề bài tập nhóm!");
            return;
        }

        log.innerText = "Compiling transaction payload for Stellar Ledger...\n";
        
        // Mô phỏng quá trình truyền parameter và thực thi hàm require_auth() của Soroban Contract
        setTimeout(() => {
            log.innerText += `🔹 Target Mode: ${mode === 'escrow_lock' ? '🔒 Private Lock Escrow' : 'Standard'}\n
