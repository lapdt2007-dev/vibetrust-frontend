<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTrust - Stellar Testnet Demo</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { text-align: center; color: var(--primary); margin-top: 0; }
        p.subtitle { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; }
        input, select { width: 100%; padding: 0.75rem; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: white; font-size: 1rem; box-sizing: border-box; }
        
        button { width: 100%; padding: 0.75rem; background: var(--primary); border: none; border-radius: 8px; color: #0f172a; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 0.5rem; transition: all 0.2s; }
        button:hover { background: var(--primary-hover); }
        button.btn-secondary { background: transparent; border: 1px solid var(--primary); color: var(--primary); margin-bottom: 1rem; }
        
        .status-box { background: #0f172a; border-radius: 8px; padding: 0.75rem; font-size: 0.85rem; border: 1px solid #334155; margin-top: 1.5rem; }
        .status-title { font-weight: bold; color: var(--text-muted); margin-bottom: 0.25rem; }
        .status-value { color: var(--success); font-family: monospace; white-space: pre-line; word-break: break-all; }
        .divider { height: 1px; background: #334155; margin: 1.5rem 0; }
        
        /* Nút nhập tay cứu cánh */
        .bypass-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.8rem; color: var(--warning); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>VibeTrust</h1>
    <p class="subtitle">The Anti-Flake Network (Stellar Testnet)</p>

    <button id="connectWalletBtn" class="btn-secondary">1. Click to Connect Wallet</button>
    
    <div class="form-group">
        <label>Connected Wallet Address</label>
        <input type="text" id="walletAddress" placeholder="Waiting for connection..." readonly>
    </div>

    <div class="divider"></div>

    <div class="form-group">
        <label>Commitment / Title</label>
        <input type="text" id="contractTitle" value="Submit Cyber Security Assignment Group 2">
    </div>

    <div class="form-group">
        <label>Security Deposit (XLM)</label>
        <input type="number" id="depositAmount" value="10" min="0">
    </div>

    <div class="form-group">
        <label>Contract Execution Mode</label>
        <select id="contractMode">
            <option value="standard">Standard Mode (Reputation Only)</option>
            <option value="escrow_lock">🔒 Private Mode (Lock Escrow Contract)</option>
        </select>
    </div>

    <button id="signContractBtn">2. Sign & Initialize Contract</button>

    <div class="status-box">
        <div class="status-title">System Live Logs:</div>
        <div id="statusLog" class="status-value">Ready. Click the connect button above.</div>
    </div>

    <span class="bypass-link" id="bypassBtn">👉 Nhấp vào đây nếu ví bị kẹt để nhập tay giả lập quay video khẩn cấp</span>
</div>

<script>
    // 1. LUỒNG KẾT NỐI VÍ CẢI TIẾN (CHỐNG TREO)
    document.getElementById('connectWalletBtn').addEventListener('click', async () => {
        const log = document.getElementById('statusLog');
        const walletInput = document.getElementById('walletAddress');
        
        log.innerText = "[1/3] Checking browser extensions...";
        
        // Kiểm tra xem extension có tồn tại không
        const hasFreighter = window.windowFreighterApi || window.FreighterApi;
        
        if (!hasFreighter) {
            log.innerText = "❌ ERROR: Không tìm thấy ví Freighter trên trình duyệt này!";
            alert("Vui lòng cài đặt Extension Freighter và ĐĂNG NHẬP vào ví trước.");
            return;
        }

        log.innerText = "[2/3] Extension found! Requesting permission...\n(Nếu không thấy gì, hãy mở trực tiếp tiện ích ví ở góc trình duyệt để phê duyệt)";
        
        // Đặt một bộ đếm thời gian, nếu sau 3 giây ví không thèm trả lời thì báo lỗi rõ ràng
        const timeoutId = setTimeout(() => {
            log.innerText = "⚠️ Cảnh báo: Ví Freighter đang từ chối phản hồi tự động.\n👉 Bạn hãy nhấn vào dòng chữ vàng ở dưới cùng để kích hoạt chế độ nhập tay quay video ngay!";
        }, 3000);

        try {
            const provider = window.windowFreighterApi || window.FreighterApi;
            
            // Gọi hàm check kết nối trước
            const isConnected = await provider.isConnected();
            log.innerText += `\nConnection status: ${isConnected}`;

            // Ép ví mở pop-up lấy Public Key
            const publicKey = await provider.getPublicKey();
            
            if (publicKey) {
                clearTimeout(timeoutId); // Xóa đếm giây nếu thành công
                walletInput.value = publicKey;
                log.innerText = "✅ THÀNH CÔNG: Đã kết nối ví Freighter!";
                document.getElementById('connectWalletBtn').innerText = "Wallet Connected!";
                document.getElementById('connectWalletBtn').style.background = "var(--success)";
                document.getElementById('connectWalletBtn').style.color = "#white";
            }
        } catch (err) {
            clearTimeout(timeoutId);
            log.innerText = "❌ Từ chối: " + err.message;
        }
    });

    // 2. LUỒNG KÝ HỢP ĐỒNG (MOCKUP SOROBAN)
    document.getElementById('signContractBtn').addEventListener('click', () => {
        const log = document.getElementById('statusLog');
        const wallet = document.getElementById('walletAddress').value;
        const title = document.getElementById('contractTitle').value;
        const amount = document.getElementById('depositAmount').value;
        const mode = document.getElementById('contractMode').value;

        if (!wallet) {
            alert("Vui lòng kết nối ví hoặc sử dụng chế độ nhập tay trước!");
            return;
        }

        log.innerText = "🔄 Đang đồng bộ thông số với Soroban Smart Contract...\n";
        
        setTimeout(() => {
            log.innerText += `🛠️ Gọi hàm Contract: initialize_escrow()\n`;
            log.innerText += `💰 Số tiền khóa: ${amount} XLM\n`;
            log.innerText += `🔑 Yêu cầu xác thực chữ ký (require_auth) cho ví: ${wallet}\n`;
            
            setTimeout(() => {
                log.innerText += `\n🎉 [XÁC THỰC THÀNH CÔNG ON-CHAIN]\n`;
                log.innerText += `Dữ liệu đã được ghi vĩnh viễn vào Stellar Ledger mạng Testnet.\n`;
                log.innerText += `Trạng thái: is_locked = true | mode = ${mode}`;
            }, 1000);
        }, 800);
    });

    // 3. PHƯƠNG ÁN PHÒNG HỜ: NHẬP TAY ĐỂ QUAY VIDEO CỨU CÁNH
    document.getElementById('bypassBtn').addEventListener('click', () => {
        const walletInput = document.getElementById('walletAddress');
        const log = document.getElementById('statusLog');
        
        // Điền một địa chỉ ví giả lập chuẩn của mạng Stellar
        const mockWallet = "GBXFFF34...STELLAR...TESTNET...UR67UX";
        walletInput.value = mockWallet;
        
        log.innerText = "⚠️ Đã kích hoạt chế độ Giả Lập Ví Thành Công để quay Video Demo!";
        document.getElementById('connectWalletBtn').innerText = "Wallet Connected (Demo)";
        document.getElementById('connectWalletBtn').style.background = "var(--warning)";
    });
</script>

</body>
</html>
